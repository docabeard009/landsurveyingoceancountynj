# Netlify config for Lakeland Surveying

# Rebuilds the chatbot's page index from your live HTML on every deploy,
# so the bot auto-learns new/edited pages. Read-only; never edits your pages.
[build]
  command = "node scripts/build-knowledge.mjs"

# The AI backend + insights functions
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
